<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0A0A0F"/>
<title>MetaDash</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230A0A0F'/><rect x='15' y='55' width='15' height='30' rx='3' fill='%237B61FF'/><rect x='35' y='35' width='15' height='50' rx='3' fill='%237B61FF'/><rect x='55' y='45' width='15' height='40' rx='3' fill='%237B61FF'/><rect x='75' y='20' width='15' height='65' rx='3' fill='%237B61FF'/></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#14141C;--bg3:#1E1E2E;--bg4:#222230;
  --text:#F0EEF8;--text2:#888;--text3:#555;--text4:#444;
  --border:#1E1E2E;--border2:#222230;
  --purple:#7B61FF;--purple-dim:#7B61FF22;--purple-border:#7B61FF44;--purple-bg:#1A1A2E;--purple-light:#A692FF;
  --green:#34D399;--green-bg:#0F3D2A;
  --yellow:#FACC15;--yellow-bg:#2A2A15;
  --red:#F87171;--red-bg:#3D1515;
  --shadow:#00000066;
}
[data-theme="light"]{
  --bg:#F0F0F8;--bg2:#FFFFFF;--bg3:#E8E8F4;--bg4:#D8D8EC;
  --text:#1A1A2E;--text2:#555;--text3:#888;--text4:#AAA;
  --border:#E0E0F0;--border2:#D0D0E8;
  --purple:#6B51EF;--purple-dim:#7B61FF18;--purple-border:#7B61FF66;--purple-bg:#EDE8FF;--purple-light:#5B41DF;
  --green:#16A34A;--green-bg:#DCFCE7;
  --yellow:#CA8A04;--yellow-bg:#FEF9C3;
  --red:#DC2626;--red-bg:#FEE2E2;
  --shadow:#00000022;
}
html,body{overflow-x:hidden;overscroll-behavior:none;touch-action:pan-y;max-width:100vw}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none}.screen.active{display:block}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:2rem 1.5rem;max-width:420px;margin:0 auto}
.logo{font-size:28px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px}.logo span{color:var(--purple)}
.tagline{font-size:14px;color:var(--text2);margin-bottom:3rem;font-weight:300}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#666;margin-bottom:6px;font-weight:500}
.input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);margin-bottom:1rem;outline:none;transition:border-color 0.2s}
.input:focus{border-color:var(--purple)}
.btn{width:100%;background:var(--purple);border:none;border-radius:10px;padding:16px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;color:#fff;cursor:pointer;margin-top:0.5rem;transition:opacity 0.2s,transform 0.1s}
.btn:active{transform:scale(0.98);opacity:0.9}
.hint{font-size:12px;color:var(--text3);text-align:center;margin-top:1.5rem}
.error-msg{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:none}
.header{padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0A0A0FEE;backdrop-filter:blur(12px);z-index:10;border-bottom:1px solid #14141C}
.header-logo{font-size:16px;font-weight:600;letter-spacing:-0.3px;color:#F0EEF8}.header-logo span{color:#7B61FF}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--purple)22;border:1.5px solid var(--purple-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--purple);cursor:pointer}
.avatar-wrap{position:relative}
.avatar-menu{position:absolute;top:40px;right:0;background:#14141C;border:1px solid #1E1E2E;border-radius:12px;padding:0.5rem;min-width:160px;z-index:100;display:none;box-shadow:0 8px 24px #00000066}
.avatar-menu.open{display:block}
.avatar-menu-name{font-size:13px;padding:8px 12px;color:var(--text2);border-bottom:1px solid var(--border);margin-bottom:4px}
.avatar-menu-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:13px;cursor:pointer;color:#F87171;transition:background 0.15s}
.avatar-menu-item:hover{background:#1E1E2E}
.dash{max-width:420px;margin:0 auto;padding-bottom:2rem}
.period-tabs{padding:0.75rem 1.25rem;display:flex;gap:4px}
.ptab{flex:1;text-align:center;padding:6px 0;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--text3);transition:all 0.15s;border:none;background:none}
.ptab.active{background:var(--bg2);color:var(--text)}
.filter-bar{padding:0 1.25rem;margin-bottom:0.75rem;display:flex;flex-direction:column;gap:8px}
.filter-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s}
.filter-input:focus{border-color:var(--purple)}
.filter-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.filter-clear{width:100%;background:transparent;border:1px solid #F87171;border-radius:10px;padding:8px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--red);cursor:pointer;display:none}
.filter-summary{font-size:12px;color:var(--purple);padding:0 1.25rem;margin-bottom:0.5rem;display:none}
.hero{margin:0.5rem 1.25rem 1rem;background:var(--bg2);border-radius:16px;padding:1.25rem;border:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:var(--purple)15;border-radius:50%}
.hero-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:4px}
.hero-value{font-size:32px;font-weight:600;letter-spacing:-1px;margin-bottom:2px}
.hero-currency{font-size:18px;font-weight:400;color:var(--text2)}
.delta{font-size:12px;font-family:'DM Mono',monospace;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple);margin-top:4px}
.section-title{padding:0.5rem 1.25rem;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:500}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 1.25rem;margin-bottom:1rem}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem}
.mc-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.mc-value{font-size:20px;font-weight:600;letter-spacing:-0.5px;margin-bottom:4px}
.mc-sub{font-size:11px;font-family:'DM Mono',monospace;color:#666}
.mc-sub.up{color:var(--green)}.mc-sub.down{color:var(--red)}.mc-sub.purple{color:var(--purple)}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.client-name{padding:0.75rem 1.25rem 0.25rem;font-size:22px;font-weight:600;letter-spacing:-0.5px}
.chart-card{margin:0 1.25rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.chart-title{font-size:13px;font-weight:500}
.chart-meta{font-size:11px;color:var(--text3)}
.bars{display:flex;align-items:flex-end;gap:3px;height:80px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bar{width:100%;border-radius:3px 3px 0 0;background:var(--purple)33;min-height:2px}
.bar.today{background:var(--purple)}
.bar-label{font-size:8px;color:var(--text4);font-family:'DM Mono',monospace}
.camp-list{padding:0 1.25rem;margin-bottom:1rem;display:flex;flex-direction:column;gap:8px}
.camp-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s}
.camp-item:active{border-color:var(--purple)55}
.camp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.camp-info{flex:1;min-width:0}
.camp-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.camp-type{font-size:11px;color:var(--text3);margin-top:2px}
.camp-arrow{font-size:16px;color:var(--text4)}
.modal-overlay{position:fixed;inset:0;background:#000000CC;z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:1.5rem 1.25rem 2.5rem;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 1.25rem}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px;letter-spacing:-0.3px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:1.25rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.modal-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:0.875rem}
.modal-card .mc-value{font-size:18px}
.close-btn{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text2);cursor:pointer;margin-top:0.5rem}
.modal-loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <img src="https://gptriade.com.br/wp-content/uploads/2023/01/Logo-Triade-1-300x100.png" style="height:36px;width:auto;margin-bottom:1.5rem;display:block;align-self:flex-start;" alt="Agência Tríade"/>
    <div class="logo">meta<span>dash</span></div>
    <div class="tagline">Resultados dos seus anúncios, em tempo real.</div>
    <div class="error-msg" id="error-msg">E-mail não encontrado.</div>
    <div class="label">E-mail</div>
    <input class="input" type="email" id="login-email" placeholder="seu@email.com"/>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div class="hint">Digite o e-mail cadastrado para acessar</div>
  </div>
</div>

<div class="screen" id="screen-dash">
  <div class="header">
    <img src="https://gptriade.com.br/wp-content/uploads/2023/01/Logo-Triade-1-300x100.png" style="height:24px;width:auto;" alt="Agência Tríade"/>
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="toggleTheme()" id="theme-btn" style="background:none;border:1px solid #222230;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:14px;color:#888">🌙</button>
      <div class="header-logo">meta<span>dash</span></div>
      <div class="avatar-wrap">
        <div class="avatar" id="avatar" onclick="toggleMenu()">--</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-name" id="menu-name">--</div>
          <div class="avatar-menu-item" onclick="doLogout()">&#x2192; Sair</div>
        </div>
      </div>
    </div>
  </div>
  <div class="dash">
    <div class="period-tabs">
      <button class="ptab" onclick="setPeriod('7d',this)">7 dias</button>
      <button class="ptab active" onclick="setPeriod('30d',this)">30 dias</button>
      <button class="ptab" onclick="setPeriod('90d',this)">90 dias</button>
    </div>
    <div class="filter-bar">
      <input class="filter-input" type="text" id="filter-name" placeholder="🔍 Buscar campanha..." oninput="applyFilter()"/>
      <div class="filter-dates">
        <input class="filter-input" type="date" id="filter-start" onchange="applyFilter()"/>
        <input class="filter-input" type="date" id="filter-end" onchange="applyFilter()"/>
      </div>
      <button class="filter-clear" id="filter-clear" onclick="clearFilter()">✕ Limpar filtro</button>
    </div>
    <div class="filter-summary" id="filter-summary"></div>
    <div id="dash-content"><div class="loading"><span class="spinner"></span>Carregando métricas...</div></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"><div class="modal-loading"><span class="spinner"></span>Carregando...</div></div>
    <button class="close-btn" onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
const API = 'https://api.gptriade.com.br';
let currentClient = null;
let currentPeriod = '30d';
let currentAccountId = null;
let rawMetrics = null;

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return;
  const res = await fetch(`${API}/clients`);
  const clients = await res.json();
  const client = clients.find(c => c.email === email);
  if (!client) { document.getElementById('error-msg').style.display = 'block'; return; }
  document.getElementById('error-msg').style.display = 'none';
  currentClient = client;
  document.getElementById('avatar').textContent = client.name.slice(0,2).toUpperCase();
  document.getElementById('menu-name').textContent = client.name;
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-dash').classList.add('active');
  sessionStorage.setItem('metadash_email', email);
  loadDash();
}

async function loadDash() {
  document.getElementById('dash-content').innerHTML = '<div class="loading"><span class="spinner"></span>Carregando métricas...</div>';
  const accRes = await fetch(`${API}/accounts/${currentClient.id}`);
  const accounts = await accRes.json();
  if (!accounts.length) { document.getElementById('dash-content').innerHTML = '<div class="loading">Nenhuma conta encontrada.</div>'; return; }
  const acc = accounts[0];
  currentAccountId = acc.id;
  const metRes = await fetch(`${API}/metrics/${acc.id}?period=${currentPeriod}`);
  const m = await metRes.json();
  if (m.error) { document.getElementById('dash-content').innerHTML = '<div class="loading">Erro ao carregar métricas.</div>'; return; }
  rawMetrics = m;
  renderDash(m.campaigns, m.daily, parseFloat(m.spend), m.impressions, m.clicks, m.conversations, m.reach, m.ctr, m.cpm, false);
}

function renderDash(campaigns, daily, spendVal, impressionsVal, clicksVal, conversationsVal, reachVal, ctrVal, cpmVal, isFiltered) {
  const cpc = clicksVal > 0 ? (spendVal/clicksVal).toFixed(2) : '0.00';
  const maxSpend = Math.max(...(daily||[]).map(d=>d.spend), 1);
  const minSpend = Math.min(...(daily||[]).map(d=>d.spend));
  const daily14 = (daily||[]).slice(-14);

  const barsHtml = daily14.map((d,i,arr) => {
    const h = Math.max(Math.round((d.spend/maxSpend)*76), 2);
    const isLast = i === arr.length-1;
    const day = new Date(d.date).getDate();
    const val = d.spend.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    return `<div class="bar-wrap" onclick="showBarTip(this,'R$ ${val}')"><div class="bar${isLast?' today':''}" style="height:${h}px"></div><div class="bar-label">${day}</div></div>`;
  }).join('');

  const maxVal = maxSpend.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const minVal = minSpend.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

  const campsHtml = (campaigns||[]).map(c => `
    <div class="camp-item" onclick="openCampaign('${c.id}','${c.name.replace(/'/g,"\\'").replace(/`/g,"'")}')">
      <div class="camp-dot" style="background:${c.effective_status==='ACTIVE'?'#34D399':c.effective_status==='PAUSED'?'#FACC15':'#F87171'}"></div>
      <div class="camp-info">
        <div class="camp-name">${c.name}</div>
        <div class="camp-type">${fmtObjective(c.objective)} · <span style="color:${c.effective_status==='ACTIVE'?'#34D399':c.effective_status==='PAUSED'?'#FACC15':'#F87171'};font-size:10px">${(c.effective_status==='ACTIVE'&&c.stop_time&&new Date(c.stop_time)<new Date())?'Concluída':c.effective_status==='ACTIVE'?'Ativa':c.effective_status==='PAUSED'?'Pausada':'Concluída'}</span></div>
      </div>
      <div class="camp-arrow">›</div>
    </div>
  `).join('') || `<div style="padding:1rem 1.25rem;font-size:13px;color:var(--text3)">${isFiltered?'Nenhuma campanha encontrada':'Nenhuma campanha ativa'}</div>`;

  document.getElementById('dash-content').innerHTML = `
    <div class="client-name">${currentClient.name}</div>
    <div class="hero">
      <div class="hero-label">Valor Gasto</div>
      <div class="hero-value"><span class="hero-currency">R$ </span>${spendVal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      <div class="delta">${isFiltered?'Período filtrado':'Últimos '+(currentPeriod==='7d'?'7':currentPeriod==='30d'?'30':'90')+' dias'}</div>
    </div>
    <div class="section-title">Visão Geral</div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="mc-label">Alcance</div><div class="mc-value">${fmtNum(reachVal)}</div><div class="mc-sub">pessoas únicas</div></div>
      <div class="metric-card"><div class="mc-label">Impressões</div><div class="mc-value">${fmtNum(impressionsVal)}</div><div class="mc-sub">exibições</div></div>
      <div class="metric-card"><div class="mc-label">Cliques</div><div class="mc-value">${fmtNum(clicksVal)}</div><div class="mc-sub up">CTR ${impressionsVal>0?((clicksVal/impressionsVal)*100).toFixed(2):0}%</div></div>
      <div class="metric-card"><div class="mc-label">CPM</div><div class="mc-value">R$ ${parseFloat(cpmVal).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="mc-sub">por mil impressões</div></div>
      <div class="metric-card"><div class="mc-label">Conversas</div><div class="mc-value">${fmtNum(conversationsVal)}</div><div class="mc-sub purple">WhatsApp iniciadas</div></div>
      <div class="metric-card"><div class="mc-label">CPC</div><div class="mc-value">R$ ${cpc}</div><div class="mc-sub">custo por clique</div></div>
    </div>
    <div class="section-title">Gasto Diário</div>
    <div class="chart-card">
      <div class="chart-header"><div class="chart-title">Gasto por dia</div><div class="chart-meta">${isFiltered?'Período filtrado':'Últimos 14 dias'}</div></div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <div style="display:flex;flex-direction:column;justify-content:space-between;height:92px;padding-bottom:16px;flex-shrink:0">
          <span style="font-size:9px;font-family:'DM Mono',monospace;color:var(--text3)">R$${maxVal}</span>
          <span style="font-size:9px;font-family:'DM Mono',monospace;color:var(--text3)">R$${minVal}</span>
        </div>
        <div style="flex:1">
          <div id="bar-tip" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--purple);height:16px;text-align:center;margin-bottom:4px"></div>
          <div class="bars">${barsHtml}</div>
        </div>
      </div>
    </div>
    <div class="section-title">Campanhas</div>
    <div class="camp-list">${campsHtml}</div>
  `;
}

function applyFilter() {
  if (!rawMetrics) return;
  const name = document.getElementById('filter-name').value.toLowerCase().trim();
  const start = document.getElementById('filter-start').value;
  const end = document.getElementById('filter-end').value;
  const hasFilter = name || start || end;
  document.getElementById('filter-clear').style.display = hasFilter ? 'block' : 'none';

  if (start && end) {
    const diff = (new Date(end) - new Date(start)) / (1000*60*60*24);
    if (diff > 90) {
      const s = document.getElementById('filter-summary');
      s.style.display = 'block';
      s.style.color = '#F87171';
      s.textContent = '⚠️ Período máximo de 90 dias';
      return;
    }
  }

  let camps = rawMetrics.campaigns || [];
  if (name) camps = camps.filter(c => c.name.toLowerCase().includes(name));

  let daily = rawMetrics.daily || [];
  if (start) daily = daily.filter(d => d.date >= start);
  if (end) daily = daily.filter(d => d.date <= end);

  const spendVal = daily.length && hasFilter ? daily.reduce((a,d)=>a+d.spend,0) : parseFloat(rawMetrics.spend);
  const impressionsVal = daily.length && hasFilter ? daily.reduce((a,d)=>a+d.impressions,0) : rawMetrics.impressions;
  const clicksVal = daily.length && hasFilter ? daily.reduce((a,d)=>a+d.clicks,0) : rawMetrics.clicks;

  const summary = document.getElementById('filter-summary');
  if (hasFilter) {
    summary.style.display = 'block';
    summary.style.color = '#7B61FF';
    const parts = [];
    if (name) parts.push(`"${name}": ${camps.length} campanha(s)`);
    if (start || end) parts.push('período filtrado');
    summary.textContent = '✓ ' + parts.join(' · ');
  } else {
    summary.style.display = 'none';
  }

  renderDash(camps, daily, spendVal, impressionsVal, clicksVal, rawMetrics.conversations, rawMetrics.reach, rawMetrics.ctr, rawMetrics.cpm, hasFilter);
}

function clearFilter() {
  document.getElementById('filter-name').value = '';
  document.getElementById('filter-start').value = '';
  document.getElementById('filter-end').value = '';
  document.getElementById('filter-clear').style.display = 'none';
  document.getElementById('filter-summary').style.display = 'none';
  if (rawMetrics) renderDash(rawMetrics.campaigns, rawMetrics.daily, parseFloat(rawMetrics.spend), rawMetrics.impressions, rawMetrics.clicks, rawMetrics.conversations, rawMetrics.reach, rawMetrics.ctr, rawMetrics.cpm, false);
}

async function openCampaign(campId, campName) {
  document.getElementById('modal-content').innerHTML = '<div class="modal-loading"><span class="spinner"></span>Carregando campanha...</div>';
  document.getElementById('modal-overlay').classList.add('open');
  const res = await fetch(`${API}/campaign/${campId}?accountId=${currentAccountId}&period=${currentPeriod}`);
  const m = await res.json();
  if (m.error) { document.getElementById('modal-content').innerHTML = '<div class="modal-loading">Erro ao carregar campanha.</div>'; return; }
  const cpc = m.clicks > 0 ? (parseFloat(m.spend)/m.clicks).toFixed(2) : '0.00';
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${campName}</div>
    <div class="modal-sub">Métricas — ${currentPeriod==='7d'?'7':currentPeriod==='30d'?'30':'90'} dias</div>
    <div class="modal-grid">
      <div class="modal-card"><div class="mc-label">Gasto</div><div class="mc-value">R$ ${parseFloat(m.spend).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
      <div class="modal-card"><div class="mc-label">Alcance</div><div class="mc-value">${fmtNum(m.reach)}</div></div>
      <div class="modal-card"><div class="mc-label">Impressões</div><div class="mc-value">${fmtNum(m.impressions)}</div></div>
      <div class="modal-card"><div class="mc-label">Frequência</div><div class="mc-value">${m.frequency}×</div></div>
      <div class="modal-card"><div class="mc-label">Cliques</div><div class="mc-value">${fmtNum(m.clicks)}</div><div class="mc-sub up">CTR ${m.ctr}%</div></div>
      <div class="modal-card"><div class="mc-label">CPM</div><div class="mc-value">R$ ${parseFloat(m.cpm).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
      <div class="modal-card"><div class="mc-label">Conversas</div><div class="mc-value">${fmtNum(m.conversations)}</div><div class="mc-sub purple">WhatsApp</div></div>
      <div class="modal-card"><div class="mc-label">CPC</div><div class="mc-value">R$ ${cpc}</div></div>
    </div>
  `;
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function showBarTip(el, val) {
  const tip = document.getElementById('bar-tip');
  if (tip) { tip.textContent = val; setTimeout(()=>tip.textContent='', 2000); }
}

function fmtNum(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function fmtObjective(o) {
  const map = {'MESSAGES':'Mensagens','CONVERSIONS':'Conversões','REACH':'Alcance','TRAFFIC':'Tráfego','ENGAGEMENT':'Engajamento','OUTCOME_ENGAGEMENT':'Mensagens','OUTCOME_TRAFFIC':'Tráfego','OUTCOME_LEADS':'Leads','OUTCOME_AWARENESS':'Reconhecimento','OUTCOME_SALES':'Vendas','LEAD_GENERATION':'Leads','BRAND_AWARENESS':'Reconhecimento','VIDEO_VIEWS':'Visualizações'};
  return map[o] || o || 'Campanha';
}

function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadDash();
}

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('theme-btn');
  if (html.getAttribute('data-theme') === 'light') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
    sessionStorage.setItem('metadash_theme', 'dark');
  } else {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '☀️';
    sessionStorage.setItem('metadash_theme', 'light');
  }
}

function toggleMenu() {
  document.getElementById('avatar-menu').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  const menu = document.getElementById('avatar-menu');
  const avatar = document.getElementById('avatar');
  if (menu && !menu.contains(e.target) && avatar && !avatar.contains(e.target)) {
    menu.classList.remove('open');
  }
});

function doLogout() {
  currentClient = null;
  rawMetrics = null;
  sessionStorage.removeItem('metadash_email');
  document.getElementById('screen-dash').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-email').value = '';
  document.getElementById('avatar-menu').classList.remove('open');
}

document.getElementById('login-email').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});

window.addEventListener('load', async () => {
  const theme = sessionStorage.getItem('metadash_theme');
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = '☀️';
  }
  const saved = sessionStorage.getItem('metadash_email');
  if (saved) {
    document.getElementById('login-email').value = saved;
    await doLogin();
  }
});
</script>
</body>
</html>
